<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            color: #fff;
        }

        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-box {
            background: linear-gradient(180deg, #252525 0%, #1a1a1a 100%);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 2px solid #dc2f02;
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.5s ease-out;
        }

        .auth-title {
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 4px 0 #dc2f02;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #ff6b35;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #dc2f02;
            border-radius: 8px;
            background: #333;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            background: #3d3d3d;
            box-shadow: 0 0 15px rgba(220, 47, 2, 0.5),
                        inset 0 0 10px rgba(0, 0, 0, 0.3);
            border-color: #ff6b35;
        }

        .form-input::placeholder {
            color: #888;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #dc2f02 0%, #ff6b35 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(220, 47, 2, 0.4);
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 47, 2, 0.6),
                        0 0 30px rgba(220, 47, 2, 0.3);
            background: linear-gradient(135deg, #ff6b35 0%, #ffa500 100%);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 0.9rem;
        }

        .auth-toggle button {
            background: none;
            border: none;
            color: #ff6b35;
            font-weight: 700;
            cursor: pointer;
            text-decoration: underline;
            margin-left: 5px;
            font-size: 0.9rem;
        }

        .auth-toggle button:hover {
            color: #ffa500;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 15px 0;
            color: #bbb;
            font-size: 0.9rem;
        }

        .remember-me input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: #dc2f02;
        }

        .remember-me label {
            cursor: pointer;
        }

        .welcome-banner {
            background: linear-gradient(135deg, #2d5a2d 0%, #4a8c4a 100%);
            border: 2px solid #78C850;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 20px;
            color: #fff;
            font-weight: 600;
            text-align: center;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-container {
            background: linear-gradient(180deg, #252525 0%, #1a1a1a 100%);
            border-radius: 15px;
            padding: 30px;
            border: 2px solid #dc2f02;
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease-out;
        }

        .profile-header {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border: 3px solid #dc2f02;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
        }

        .profile-avatar img {
            width: 90px;
            height: 90px;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        .profile-info {
            flex: 1;
            min-width: 200px;
        }

        .profile-username {
            font-size: 0.85rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .profile-display-name {
            font-size: 1.5rem;
            color: #ff6b35;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .profile-edit-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #dc2f02 0%, #ff6b35 100%);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .profile-edit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 47, 2, 0.4);
        }

        .profile-form {
            display: none;
        }

        .profile-form.active {
            display: block;
        }

        .avatar-selector {
            background: rgba(0, 0, 0, 0.3);
            border: 2px dashed #dc2f02;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .avatar-selector-title {
            color: #ff6b35;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .avatar-option {
            width: 80px;
            height: 80px;
            border: 2px solid #666;
            border-radius: 8px;
            padding: 5px;
            background: rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-option:hover {
            border-color: #ff6b35;
            transform: scale(1.05);
        }

        .avatar-option.selected {
            border-color: #ff6b35;
            background: rgba(255, 107, 53, 0.2);
            box-shadow: 0 0 15px rgba(255, 107, 53, 0.4);
        }

        .avatar-option img {
            width: 70px;
            height: 70px;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        .profile-form-group {
            margin-bottom: 15px;
        }

        .profile-form-label {
            display: block;
            color: #ff6b35;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .profile-form-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #dc2f02;
            border-radius: 6px;
            background: #333;
            color: #fff;
            font-size: 0.95rem;
        }

        .profile-form-input:focus {
            outline: none;
            border-color: #ff6b35;
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.3);
        }

        .profile-form-buttons {
            display: flex;
            gap: 10px;
        }

        .profile-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .profile-btn-save {
            background: linear-gradient(135deg, #78C850 0%, #5da85d 100%);
            color: #fff;
        }

        .profile-btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(120, 200, 80, 0.4);
        }

        .profile-btn-cancel {
            background: rgba(220, 47, 2, 0.2);
            color: #ff6b35;
            border: 1px solid #dc2f02;
        }

        .profile-btn-cancel:hover {
            background: rgba(220, 47, 2, 0.3);
        }

        .team-builder-section {
            background: linear-gradient(180deg, #252525 0%, #1a1a1a 100%);
            border-radius: 15px;
            padding: 30px;
            border: 2px solid #dc2f02;
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease-out;
        }

        .team-builder-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .team-builder-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ff6b35;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .team-count {
            background: rgba(220, 47, 2, 0.2);
            border: 1px solid #dc2f02;
            color: #ff6b35;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .team-slots {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .team-slot {
            background: rgba(0, 0, 0, 0.3);
            border: 2px dashed #dc2f02;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .team-slot:hover {
            border-color: #ff6b35;
            background: rgba(220, 47, 2, 0.1);
        }

        .team-slot.filled {
            border-style: solid;
            border-color: #ff6b35;
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.1) 0%, rgba(220, 47, 2, 0.1) 100%);
        }

        .team-slot-empty {
            color: #666;
            font-size: 2rem;
        }

        .team-pokemon {
            width: 80px;
            height: 80px;
            margin-bottom: 8px;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        .team-pokemon-name {
            color: #ff6b35;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: capitalize;
            margin-bottom: 5px;
        }

        .team-pokemon-types {
            display: flex;
            gap: 4px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .team-type-badge {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            text-transform: uppercase;
        }

        .remove-from-team-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #dc2f02;
            border: none;
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .remove-from-team-btn:hover {
            background: #ff6b35;
            transform: rotate(90deg) scale(1.1);
        }

        .team-selector-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .team-selector-modal.active {
            display: flex;
        }

        .team-selector-content {
            background: linear-gradient(180deg, #252525 0%, #1a1a1a 100%);
            border: 2px solid #dc2f02;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .team-selector-title {
            font-size: 1.2rem;
            color: #ff6b35;
            font-weight: 700;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .favorites-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }

        .favorite-option {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #dc2f02;
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .favorite-option:hover {
            border-color: #ff6b35;
            background: rgba(255, 107, 53, 0.1);
        }

        .favorite-option.selected {
            border-color: #ff6b35;
            background: rgba(255, 107, 53, 0.2);
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.3);
        }

        .favorite-option img {
            width: 60px;
            height: 60px;
            margin-bottom: 5px;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        .favorite-option-name {
            color: #ff6b35;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .team-selector-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        .team-selector-close,
        .team-selector-confirm {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .team-selector-close {
            background: rgba(220, 47, 2, 0.2);
            color: #ff6b35;
            border: 1px solid #dc2f02;
        }

        .team-selector-close:hover {
            background: rgba(220, 47, 2, 0.3);
        }

        .team-selector-confirm {
            background: linear-gradient(135deg, #78C850 0%, #5da85d 100%);
            color: #fff;
        }

        .team-selector-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(120, 200, 80, 0.4);
        }

        .team-stats-coverage {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 25px;
        }

        .team-stats-box,
        .type-coverage-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #dc2f02;
            border-radius: 10px;
            padding: 20px;
        }

        .stats-box-title,
        .coverage-box-title {
            color: #ff6b35;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(220, 47, 2, 0.2);
        }

        .stat-label {
            color: #bbb;
            font-size: 0.85rem;
        }

        .stat-value {
            color: #ff6b35;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .type-coverage-group {
            margin-bottom: 15px;
        }

        .coverage-label {
            color: #ff6b35;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .type-badges-list {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .coverage-type {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            text-transform: uppercase;
        }

        .empty-team-message {
            color: #666;
            text-align: center;
            padding: 20px;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .team-stats-coverage {
                grid-template-columns: 1fr;
            }

            .team-slots {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .error-message {
            color: #ff6b35;
            background: rgba(255, 107, 53, 0.1);
            border: 1px solid #ff6b35;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .success-message {
            color: #78C850;
            background: rgba(120, 200, 80, 0.1);
            border: 1px solid #78C850;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .navbar {
            background: linear-gradient(90deg, #1a1a1a 0%, #252525 100%);
            border-bottom: 2px solid #dc2f02;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ff6b35;
        }

        .navbar-user {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-name {
            color: #ff6b35;
            font-weight: 600;
        }

        .logout-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #dc2f02 0%, #ff6b35 100%);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 47, 2, 0.4);
        }

        .app-wrapper {
            display: none;
        }

        .app-wrapper.authenticated {
            display: block;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: linear-gradient(180deg, #252525 0%, #1a1a1a 100%);
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 2px solid #dc2f02;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 4px 0 #dc2f02,
                        0 6px 12px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #dc2f02;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 14px 18px;
            border: 2px solid #dc2f02;
            border-radius: 10px;
            background: #333;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .search-input::placeholder {
            color: #888;
        }

        .search-input:focus {
            background: #3d3d3d;
            box-shadow: 0 0 15px rgba(220, 47, 2, 0.5),
                        inset 0 0 10px rgba(0, 0, 0, 0.3);
            border-color: #ff6b35;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-btn,
        .random-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #dc2f02 0%, #ff6b35 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(220, 47, 2, 0.4);
            white-space: nowrap;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 47, 2, 0.6),
                        0 0 30px rgba(220, 47, 2, 0.8),
                        0 0 50px rgba(255, 107, 53, 0.5);
            background: linear-gradient(135deg, #ff6b35 0%, #ffa500 100%);
        }

        .search-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(220, 47, 2, 0.4);
        }

        .random-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #5c4da8 0%, #7d61d9 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(93, 77, 168, 0.4);
            white-space: nowrap;
        }

        .random-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(93, 77, 168, 0.6),
                        0 0 30px rgba(125, 97, 217, 0.5),
                        0 0 50px rgba(125, 97, 217, 0.3);
            background: linear-gradient(135deg, #7d61d9 0%, #a89dda 100%);
        }

        .random-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(93, 77, 168, 0.4);
        }

        .results-container {
            min-height: 300px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px dashed #dc2f02;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .results-container.empty {

    <script>
        // ============ Authentication System ============
        let currentUser = null;
        let authMode = 'signup'; // 'signup' or 'login'

        // Simple hash function
        function hashPassword(password) {
            let hash = 0;
            for (let i = 0; i < password.length; i++) {
                const char = password.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16);
        }

        // Get all users from localStorage
        function getUsers() {
            return JSON.parse(localStorage.getItem('pokedex_users')) || {};
        }

        // Save users to localStorage
        function saveUsers(users) {
            localStorage.setItem('pokedex_users', JSON.stringify(users));
        }

        // Toggle between signup and login modes
        function toggleAuthMode() {
            authMode = authMode === 'signup' ? 'login' : 'signup';
            const title = document.getElementById('authTitle');
            const btn = document.getElementById('authSubmitBtn');
            const toggle = document.querySelector('.auth-toggle button');
            const message = document.getElementById('authMessage');
            const rememberMeDiv = document.getElementById('rememberMeDiv');

            message.innerHTML = '';
            document.getElementById('rememberMe').checked = false;

            if (authMode === 'login') {
                title.textContent = '🎮 Login';
                btn.textContent = 'Login';
                rememberMeDiv.style.display = 'flex';
                toggle.parentElement.querySelector('button').parentElement.innerHTML = "Don't have an account? <button type=\"button\" onclick=\"toggleAuthMode()\">Sign Up</button>";
            } else {
                title.textContent = '🎮 Sign Up';
                btn.textContent = 'Sign Up';
                rememberMeDiv.style.display = 'none';
                toggle.parentElement.innerHTML = 'Have an account? <button type="button" onclick="toggleAuthMode()">Login</button>';
            }

            document.getElementById('authForm').reset();
        }

        // Handle authentication submission
        function handleAuthSubmit(event) {
            event.preventDefault();
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value;
            const messageDiv = document.getElementById('authMessage');
            const rememberMe = document.getElementById('rememberMe').checked;

            if (!username || !password) {
                messageDiv.innerHTML = '<div class="error-message">Please fill in all fields</div>';
                return;
            }

            if (username.length < 3) {
                messageDiv.innerHTML = '<div class="error-message">Username must be at least 3 characters</div>';
                return;
            }

            if (password.length < 4) {
                messageDiv.innerHTML = '<div class="error-message">Password must be at least 4 characters</div>';
                return;
            }

            const users = getUsers();

            if (authMode === 'signup') {
                if (users[username]) {
                    messageDiv.innerHTML = '<div class="error-message">Username already exists</div>';
                    return;
                }
                // Create user with profile data
                users[username] = {
                    password: hashPassword(password),
                    displayName: username,
                    avatar: 'pikachu'
                };
                saveUsers(users);
                messageDiv.innerHTML = '<div class="success-message">Account created! You can now login</div>';
                setTimeout(() => {
                    toggleAuthMode();
                }, 1500);
            } else {
                const user = users[username];
                if (!user || user.password !== hashPassword(password)) {
                    messageDiv.innerHTML = '<div class="error-message">Invalid username or password</div>';
                    return;
                }
                // Login successful
                loginUser(username, rememberMe);
            }
        }

        // Login user
        function loginUser(username, rememberMe = false) {
            currentUser = username;
            sessionStorage.setItem('currentUser', username);
            
            if (rememberMe) {
                const expiryDate = new Date();
                expiryDate.setDate(expiryDate.getDate() + 30);
                localStorage.setItem('rememberedUser', JSON.stringify({
                    username: username,
                    expiry: expiryDate.getTime()
                }));
                localStorage.setItem('isReturningUser', 'true');
            }
            
            showApp();
        }

        // Logout user
        function logout() {
            currentUser = null;
            sessionStorage.removeItem('currentUser');
            localStorage.removeItem('rememberedUser');
            localStorage.removeItem('isReturningUser');
            document.getElementById('authForm').reset();
            authMode = 'login';
            toggleAuthMode();
            hideApp();
        }

        // Show app
        function showApp() {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('appWrapper').classList.add('authenticated');
            document.getElementById('profileSection').style.display = 'block';
            document.getElementById('userDisplay').textContent = `Welcome, ${currentUser}`;
            
            // Load and display user profile
            const users = getUsers();
            const user = users[currentUser];
            
            // Show welcome message for returning users
            const showWelcome = sessionStorage.getItem('showWelcomeMessage');
            if (showWelcome) {
                const welcomeBanner = document.getElementById('welcomeBanner');
                welcomeBanner.textContent = `🎉 Welcome back, ${user.displayName}! We've missed you!`;
                welcomeBanner.style.display = 'block';
                sessionStorage.removeItem('showWelcomeMessage');
                setTimeout(() => {
                    welcomeBanner.style.display = 'none';
                }, 5000);
            }
            
            // Display profile info
            displayProfile(user);
            initializeApp();
        }

        // Hide app
        function hideApp() {
            document.getElementById('authContainer').style.display = 'flex';
            document.getElementById('appWrapper').classList.remove('authenticated');
        }

        // Pokémon list for avatar selection
        const avatarPokemon = [
            { name: 'pikachu', id: 25 },
            { name: 'charizard', id: 6 },
            { name: 'blastoise', id: 9 },
            { name: 'venusaur', id: 3 },
            { name: 'dragonite', id: 149 },
            { name: 'lapras', id: 131 },
            { name: 'gyarados', id: 130 },
            { name: 'arcanine', id: 59 },
            { name: 'alakazam', id: 65 },
            { name: 'gengar', id: 94 },
            { name: 'machamp', id: 68 },
            { name: 'golem', id: 76 }
        ];

        let selectedAvatar = 'pikachu';

        // ============ Team Builder ============
        let userTeam = [];
        let currentTeamSlot = null;
        let selectedPokemonForTeam = null;

        // Type matchup data
        const typeMatchups = {
            normal: { strong: [], weak: ['rock', 'steel'], resist: [], immune: ['ghost'] },
            fire: { strong: ['grass', 'ice', 'bug', 'steel'], weak: ['water', 'ground', 'rock'], resist: ['grass', 'ice', 'bug', 'steel', 'fairy'], immune: [] },
            water: { strong: ['fire', 'ground', 'rock'], weak: ['grass', 'electric'], resist: ['steel', 'fire', 'water', 'ice'], immune: [] },
            electric: { strong: ['water', 'flying'], weak: ['ground'], resist: ['flying', 'steel', 'electric'], immune: [] },
            grass: { strong: ['water', 'ground', 'rock'], weak: ['fire', 'ice', 'poison', 'flying', 'bug'], resist: ['ground', 'water', 'grass', 'electric'], immune: [] },
            ice: { strong: ['flying', 'ground', 'grass', 'dragon'], weak: ['fire', 'fighting', 'rock', 'steel'], resist: ['ice'], immune: [] },
            fighting: { strong: ['normal', 'ice', 'rock', 'dark', 'steel'], weak: ['flying', 'psychic', 'fairy'], resist: ['rock', 'bug', 'dark'], immune: [] },
            poison: { strong: ['grass', 'fairy'], weak: ['ground', 'psychic'], resist: ['fighting', 'poison', 'bug', 'grass'], immune: [] },

        // Load user team from IndexedDB
        async function loadUserTeam() {
            return new Promise((resolve) => {
                if (!db || !currentUser) {
                    resolve([]);
                    return;
                }

                const transaction = db.transaction('favorites', 'readonly');
                const objectStore = transaction.objectStore('favorites');
                const request = objectStore.getAll();

                request.onsuccess = () => {
                    const teamKey = `team_${currentUser}`;
                    const allData = request.result;
                    const teamData = allData.find(item => item.key === teamKey);
                    userTeam = teamData ? teamData.team : [];
                    resolve(userTeam);
                };

                request.onerror = () => {
                    resolve([]);
                };
            });
        }

        // Save team to IndexedDB
        async function saveUserTeam() {
            return new Promise((resolve) => {
                if (!db || !currentUser) {
                    resolve();
                    return;
                }

                const transaction = db.transaction('favorites', 'readwrite');
                const objectStore = transaction.objectStore('favorites');
                const teamKey = `team_${currentUser}`;

                const teamData = {
                    key: teamKey,
                    team: userTeam,
                    username: currentUser
                };

                const request = objectStore.put(teamData);

                request.onsuccess = () => {
                    resolve();
                };

                request.onerror = () => {
                    resolve();
                };
            });
        }

        // Display team

            const slotsContainer = document.getElementById('teamSlots');
            const emptyMessage = document.getElementById('emptyTeamMessage');
            const teamStats = document.getElementById('teamStats');

            slotsContainer.innerHTML = '';

            // Display 6 slots

            if (!selectedPokemonForTeam || currentTeamSlot === null) return;

        // Calculate team stats
        function calculateAndDisplayTeamStats() {
            if (userTeam.length === 0) return;

            const stats = {
                hp: 0,
                attack: 0,
                defense: 0,
                spAtk: 0,
                spDef: 0,
                speed: 0
            };

            // This would need full Pokémon data for accurate stats
            // For now, show team composition and type coverage
            displayTypesCoverage();
        }

        // Get type coverage
        function displayTypesCoverage() {
            if (userTeam.length === 0) return;

            // Collect all types in team
            const teamTypes = new Set();
            userTeam.forEach(pokemon => {
                pokemon.types.forEach(type => teamTypes.add(type));
            });

            // Calculate coverage
            const strengths = new Set();
            const weaknesses = new Set();
            const resistances = new Set();

            teamTypes.forEach(type => {
                const matchup = typeMatchups[type];
                matchup.strong.forEach(t => strengths.add(t));
                matchup.weak.forEach(t => weaknesses.add(t));
                matchup.resist.forEach(t => resistances.add(t));
                matchup.immune.forEach(t => resistances.add(t));
            });

            // Remove overlaps
            weaknesses.forEach(w => strengths.delete(w));
            resistances.forEach(r => weaknesses.delete(r));

            const html = `
                <div class="type-coverage-group">
                    <div class="coverage-label">Offensive Coverage</div>
                    <div class="type-badges-list">
                        ${Array.from(strengths).map(type => `<span class="coverage-type" style="background: ${getTypeColor(type)}">${type}</span>`).join('') || '<span style="color: #666;">None</span>'}
                    </div>
                </div>
                <div class="type-coverage-group">
                    <div class="coverage-label">Weaknesses</div>
                    <div class="type-badges-list">
                        ${Array.from(weaknesses).map(type => `<span class="coverage-type" style="background: ${getTypeColor(type)}">${type}</span>`).join('') || '<span style="color: #666;">None</span>'}
                    </div>
                </div>
                <div class="type-coverage-group">
                    <div class="coverage-label">Resistances</div>
                    <div class="type-badges-list">
                        ${Array.from(resistances).map(type => `<span class="coverage-type" style="background: ${getTypeColor(type)}">${type}</span>`).join('') || '<span style="color: #666;">None</span>'}
                    </div>
                </div>
            `;

            const teamStatsHtml = `
                <div class="stat-item">
                    <span class="stat-label">Team Size</span>
                    <span class="stat-value">${userTeam.length} / 6</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Types Coverage</span>
                    <span class="stat-value">${teamTypes.size} types</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Unique Types</span>
                    <span class="stat-value">${Array.from(teamTypes).join(', ')}</span>
                </div>
            `;

            document.getElementById('teamStatsContent').innerHTML = teamStatsHtml;
            document.getElementById('typeCoverageContent').innerHTML = html;
        }

        // Get type color
        function getTypeColor(type) {
            const colors = {
                normal: '#A8A878', fire: '#F08030', water: '#6890F0', electric: '#F8D030',
                grass: '#78C850', ice: '#98D8D8', fighting: '#C03028', poison: '#A040A0',
                ground: '#E0C068', flying: '#A890F0', psychic: '#F85888', bug: '#A8B820',
                rock: '#B8A038', ghost: '#705898', dragon: '#7038F8', dark: '#705848',
                steel: '#B8B8D0', fairy: '#EE99AC'
            };
            return colors[type] || '#999';
        }

        // Check if user is logged in on page load
        function checkAuth() {
            let user = sessionStorage.getItem('currentUser');
            
            // If no session, check for remembered user
            if (!user) {
                const remembered = localStorage.getItem('rememberedUser');
                if (remembered) {
                    const data = JSON.parse(remembered);
                    if (data.expiry > new Date().getTime()) {
                        user = data.username;
                        sessionStorage.setItem('currentUser', user);
                        currentUser = user;
                        showApp();
                        return;
                    } else {
                        // Remembered user expired
                        localStorage.removeItem('rememberedUser');
                        localStorage.removeItem('isReturningUser');
                    }
                }
            }

            if (user) {
                currentUser = user;
                const isReturning = localStorage.getItem('isReturningUser');
                if (isReturning) {
                    localStorage.removeItem('isReturningUser');
                    sessionStorage.setItem('showWelcomeMessage', 'true');
                }
                showApp();
            } else {
                hideApp();
            }
        }

        // ============ App Initialization ============
        let appInitialized = false;

        async function initializeApp() {
            if (appInitialized) return;
            appInitialized = true;

            await initializeIndexedDB();
            updateHistoryDisplay();
            updateFavoritesDisplay();
            await loadUserTeam();
            displayTeam();
            searchInput.focus();
        }

        // ============ Pokédex App ============
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsContainer = document.getElementById('resultsContainer');
        const historySection = document.getElementById('historySection');
        const historyChips = document.getElementById('historyChips');
        const favoritesSection = document.getElementById('favoritesSection');
        const favoritesGrid = document.getElementById('favoritesGrid');
        const favoriteCounter = document.getElementById('favoriteCounter');
        let searchHistory = JSON.parse(localStorage.getItem('pokemonHistory')) || [];
        let favorites = [];
        let currentPokemon = null;
        let db = null;

        // Initialize IndexedDB
        function initializeIndexedDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('pokedex_db', 1);

                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains('favorites')) {
                        database.createObjectStore('favorites', { keyPath: 'key' });
                    }
                };

                request.onsuccess = (event) => {
                    db = event.target.result;
                    resolve(db);
                };

                request.onerror = (event) => {
                    reject(event.target.error);
                };
            });
        }

        // Get user-specific key
        function getUserFavoriteKey(pokemonName) {
            return `${currentUser}__${pokemonName}`;
        }

        // Initialize displays
        initializeIndexedDB().then(() => {
            updateHistoryDisplay();
            updateFavoritesDisplay();
        });

        // Update search history display
        function updateHistoryDisplay() {
            if (searchHistory.length === 0) {
                historySection.style.display = 'none';
                return;
            }

            historySection.style.display = 'block';
            historyChips.innerHTML = searchHistory.map(pokemon => `
                <div class="history-chip" onclick="searchInputHistory('${pokemon.name}')">
                    #${pokemon.id} ${pokemon.name}
                </div>
            `).join('');
        }

        // Search from history chip
        function searchInputHistory(name) {
            searchInput.value = name;
            searchPokemon();
        }

        // Load favorites from IndexedDB
        function loadFavorites() {
            return new Promise((resolve) => {
                if (!db || !currentUser) {
                    resolve([]);
                    return;
                }

                const transaction = db.transaction('favorites', 'readonly');
                const objectStore = transaction.objectStore('favorites');
                const request = objectStore.getAll();

                request.onsuccess = () => {
                    // Filter favorites for current user
                    favorites = request.result.filter(fav => fav.key.startsWith(`${currentUser}__`));
                    resolve(favorites);
                };

                request.onerror = () => {
                    resolve([]);
                };
            });
        }

        // Update favorites display
        async function updateFavoritesDisplay() {
            await loadFavorites();

            if (favorites.length === 0) {
                favoritesSection.style.display = 'none';
                return;
            }

            favoritesSection.style.display = 'block';
            favoriteCounter.textContent = `${favorites.length} Pokémon`;

            favoritesGrid.innerHTML = favorites.map(pokemon => `
                <div class="favorite-card">
                    <button class="remove-favorite-btn" onclick="removeFavoriteByName('${pokemon.name}')" title="Remove from favorites">×</button>
                    <img src="${pokemon.imageUrl}" alt="${pokemon.name}" onerror="this.src='https://via.placeholder.com/80?text=No+Image'">
                    <div class="favorite-card-name">${pokemon.name}</div>
                </div>
            `).join('');
        }

        // Add to favorites in IndexedDB
        function addFavorite(pokemon) {
            return new Promise((resolve) => {
                if (!db || !pokemon || !currentUser) {
                    resolve();
                    return;
                }

                const transaction = db.transaction('favorites', 'readwrite');
                const objectStore = transaction.objectStore('favorites');
                
                const favorite = {
                    key: getUserFavoriteKey(pokemon.name),
                    name: pokemon.name,
                    id: pokemon.id,
                    imageUrl: pokemon.sprites.front_default,
                    types: pokemon.types.map(t => t.type.name),
                    username: currentUser
                };

                const request = objectStore.put(favorite);

                request.onsuccess = () => {
                    updateFavoritesDisplay();
                    updateCurrentPokemonFavoriteStatus();
                    resolve();
                };

                request.onerror = () => {
                    resolve();
                };
            });
        }

        // Remove from favorites in IndexedDB
        function removeFavoriteByName(pokemonName) {
            return new Promise((resolve) => {
                if (!db || !currentUser) {
                    resolve();
                    return;
                }

                const transaction = db.transaction('favorites', 'readwrite');
                const objectStore = transaction.objectStore('favorites');
                const key = getUserFavoriteKey(pokemonName);
                const request = objectStore.delete(key);

                request.onsuccess = () => {
                    updateFavoritesDisplay();
                    updateCurrentPokemonFavoriteStatus();
                    resolve();
                };

                request.onerror = () => {
                    resolve();
                };
            });
        }

        // Remove from favorites by ID
        function removeFavorite(pokemonId) {
            return new Promise((resolve) => {
                if (!db) {
                    resolve();
                    return;
                }

                loadFavorites().then(() => {
                    const pokemon = favorites.find(p => p.id === pokemonId);
                    if (pokemon) {
                        removeFavoriteByName(pokemon.name);
                    }
                    resolve();
                });
            });
        }

        // Toggle favorite
        function toggleFavorite() {
            if (!currentPokemon) return;

            const isFavorited = favorites.find(p => p.id === currentPokemon.id);
            if (isFavorited) {
                removeFavorite(currentPokemon.id);
            } else {
                addFavorite(currentPokemon);
            }
        }

        // Update favorite button status
        async function updateCurrentPokemonFavoriteStatus() {
            await loadFavorites();
            const btn = document.getElementById('favoriteBtn');
            if (!btn || !currentPokemon) return;

            const isFavorited = favorites.find(p => p.id === currentPokemon.id);
            if (isFavorited) {
                btn.classList.remove('unfavorited');
                btn.classList.add('favorited');
                btn.innerHTML = '❤️';
            } else {
                btn.classList.remove('favorited');
                btn.classList.add('unfavorited');
                btn.innerHTML = '🤍';
            }
        }

        // Export favorites as JSON
        async function exportFavorites() {
            await loadFavorites();
            if (favorites.length === 0) {
                alert('No favorites to export!');
                return;
            }

            const dataStr = JSON.stringify(favorites, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `pokemon-favorites-${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // Add to search history
        function addToHistory(pokemon) {
            searchHistory = searchHistory.filter(p => p.id !== pokemon.id);
            searchHistory.unshift({ name: pokemon.name, id: pokemon.id });
            searchHistory = searchHistory.slice(0, 5);
            localStorage.setItem('pokemonHistory', JSON.stringify(searchHistory));
            updateHistoryDisplay();
        }

        // Shake animation on empty search
        function shakeInput() {
            searchInput.classList.remove('shake');
            void searchInput.offsetWidth;
            searchInput.classList.add('shake');
        }

        // Fetch Pokémon data from the PokeAPI
        async function searchPokemon() {
            const pokemonName = searchInput.value.toLowerCase().trim();

            if (!pokemonName) {
                shakeInput();
                resultsContainer.className = 'results-container empty';
                resultsContainer.innerHTML = '<p>Please enter a Pokémon name!</p>';
                return;
            }

            resultsContainer.className = 'results-container loading';
            resultsContainer.innerHTML = '<div style="display: flex; flex-direction: column; align-items: center; gap: 15px;"><div class="loading-spinner"></div><p>Searching Pokédex...</p></div>';

            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${pokemonName}`);

                if (!response.ok) {
                    throw new Error('Pokémon not found');
                }

                const data = await response.json();
                addToHistory(data);
                displayPokemon(data);
            } catch (error) {
                resultsContainer.className = 'results-container empty';
                resultsContainer.innerHTML = `<p class="error-message">❌ ${error.message}. Try another name!</p>`;
            }
        }

        // Search for random Pokémon
        function searchRandomPokemon() {

            searchInput.value = randomId;
            searchPokemon();
        }

        // Event listeners
        searchBtn.addEventListener('click', searchPokemon);
        document.getElementById('randomBtn').addEventListener('click', searchRandomPokemon);

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchPokemon();
            }
        });

        // Check authentication on page load
        checkAuth();
    </script>
</body>
</html>
